<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberGuard Admin Login</title>

   <!-- Favicon / Browser Tab Logo -->
    <link rel="icon" type="image/svg+xml" href="cyberguard_icon.svg">
    <link rel="shortcut icon" type="image/svg+xml" href="cyberguard_icon.svg">
    <link rel="apple-touch-icon" href="cyberguard_icon.svg">
    <link rel="icon" type="image/png" sizes="32x32" href="cyberguard_icon.svg">
    <link rel="icon" type="image/png" sizes="16x16" href="cyberguard_icon.svg">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #0a0c12 0%, #0f1118 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            max-width: 420px;
            width: 100%;
        }

        .login-card {
            background: rgba(21, 23, 31, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(45, 122, 255, 0.3);
            border-radius: 32px;
            padding: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .logo {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo h1 {
            color: white;
            font-size: 1.8rem;
            font-weight: 700;
        }

        .logo span {
            color: #2d7aff;
        }

        .logo p {
            color: #a0a8c3;
            font-size: 0.85rem;
            margin-top: 0.5rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            color: #a0a8c3;
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
        }

        .form-group input {
            width: 100%;
            background: rgba(15, 17, 24, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 0.9rem 1rem;
            color: white;
            font-size: 0.95rem;
            transition: all 0.2s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #2d7aff;
            box-shadow: 0 0 0 3px rgba(45, 122, 255, 0.2);
        }

        .btn-login {
            width: 100%;
            background: linear-gradient(135deg, #2d7aff, #1a5fdf);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 0.9rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(45, 122, 255, 0.3);
        }

        .error-message {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 12px;
            padding: 0.8rem;
            margin-bottom: 1rem;
            color: #ef4444;
            font-size: 0.85rem;
            text-align: center;
            display: none;
        }

        .security-note {
            text-align: center;
            margin-top: 1.5rem;
            color: #6b7280;
            font-size: 0.7rem;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo">
                <h1>Cyber<span>Guard</span></h1>
                <p>Administrator Access</p>
            </div>

            <div id="errorMsg" class="error-message">
                ⚠️ Invalid credentials. Please try again.
            </div>

            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" placeholder="Enter username" autocomplete="off">
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Enter password" onkeypress="if(event.key==='Enter') login()">
            </div>

            <button class="btn-login" onclick="login()">Login to Dashboard →</button>

            <div class="security-note">
                🔒 Secure access only. All activities are logged.
            </div>
        </div>
    </div>

    <script>
        // Change these credentials in production
        const ADMIN_USERNAME = "cyberguard_admin";
        const ADMIN_PASSWORD = "Secure@2026!";

        function login() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');

            if (username === ADMIN_USERNAME && password === ADMIN_PASSWORD) {
                // Store session
                sessionStorage.setItem('admin_logged_in', 'true');
                sessionStorage.setItem('admin_login_time', new Date().toISOString());
                
                // Redirect to dashboard
                window.location.href = 'admin_dashboard.html';
            } else {
                errorMsg.style.display = 'block';
                document.getElementById('username').value = '';
                document.getElementById('password').value = '';
                
                setTimeout(() => {
                    errorMsg.style.display = 'none';
                }, 3000);
            }
        }
    </script>
</body>
</html>
